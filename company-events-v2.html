    const menuData=E.menuFor(state.plan,state.menu);
    const row=(k,v)=>'<div class="receipt__row"><span class="receipt__k">'+k+'</span><span class="receipt__dots"></span><span class="receipt__v">'+v+'</span></div>';
    const subRow=(k,v)=>'<div class="receipt__row receipt__row--sub"><span class="receipt__k">'+k+'</span><span class="receipt__dots"></span><span class="receipt__v">'+v+'</span></div>';
    // menu detail shown directly (no chips, no collapsible); dish titles only
    const detail=menuData.map(c=>{
      const names=c.items.map(it=>E.splitDish(it).name);
      const p=E.categoryPortions(c.t,names,gg);
      const rows=p.isBar
        ? names.map(n=>'<div class="rcpt-dish">• '+n+'</div>').join('')
        : p.breakdown.map(b=>'<div class="rcpt-dish"><b>'+(b.qty!=null?b.qty+' '+b.unit:'כלול')+'</b> '+E.dishDisplay(c.t,b.name)+'</div>').join('');
      return '<div class="rcpt-cat"><div class="rcpt-cat__t">'+c.t+'</div>'+rows+'</div>';
    }).join('');
    // each add-on on its own line with its own price; show the multiplication where it applies
    const addonLine=a=>{
      const u=E.addonUnitPrice(a,gg);
      let v;
      if(a.unit==='tray'){ const t=Math.max(1,Math.ceil(gg/10)); v=t+'×'+fmt(a.price)+' = '+fmt(u); }
      else if(a.unit==='head'){ v=gg+'×'+fmt(a.price)+' = '+fmt(u); }
      else v=fmt(u);
      return subRow(a.label,v);
    };
    return '<span class="receipt__bar"></span>'+
      '<div class="receipt__head"><span class="receipt__brand">עזרא תל אביב</span><span class="receipt__ref">'+(ref?'#'+ref:'סיכום ההזמנה')+'</span></div>'+
      '<div class="receipt__perf"></div>'+
      row('מסלול',plan.label)+row('מספר אורחים',gg+' אורחים')+
      row('תאריך',state.date?humanDate(state.date):'-')+row('חלון זמן',state.slot||'-')+
      row('מוזיקה',plan.music)+row('בר',plan.barTier)+
      '<div class="receipt__sect"><div class="receipt__sect-head"><span class="receipt__k">התפריט שלכם</span><span class="receipt__v">'+(state.menu==='evening'?'תפריט ערב':'תפריט יום')+'</span></div>'+
        '<div class="receipt__detail">'+detail+'</div>'+
      '</div>'+
      '<div class="receipt__perf"></div>'+
      subRow(plan.label+' · '+gg+' × '+fmt(ph),fmt(base))+
      (sel.length
        ? '<div class="receipt__addhead">תוספות</div>'+sel.map(addonLine).join('')
        : subRow('תוספות','ללא'))+
      '<div class="receipt__total"><span class="receipt__k">מחיר סופי</span><span class="receipt__sum">'+fmt(total)+'</span></div>';
  }
  function step6(){
    setFoot('שליחת הבקשה','',()=>{   // terms line lives under the form (.legal); no need to repeat it in the footer
      // consent is mandatory: block the send + flag it if unchecked
      const c=$('fConsent');
      if(!c || !c.checked){
        const err=$('consentErr'), row=$('consentRow');
        if(err) err.hidden=false; if(row) row.classList.add('check--err');
        (err||row||c).scrollIntoView({behavior:'smooth',block:'center'});
        return;
      }
      state.notes=$('fNotes').value; submitLead(); render(7);
      if(window.parent!==window){ try{ window.parent.postMessage({ezra:'confirmed'},'*'); }catch(e){} }
    },true,false);   // step 6 = the details step; the "talk to sales" checkbox handles the abandon path here
    body.innerHTML =
      '<h2 class="steptitle">הפרטים שלכם</h2>'+
      '<p class="stepsub">נשלח אליכם הצעה וחוזה לחתימה דיגיטלית</p>'+
      '<div class="details">'+
        '<div class="details__form" id="detForm">'+
          '<div class="frow">'+
            '<div class="bfield"><label>שם מלא</label><input type="text" id="fName" autocomplete="name" /></div>'+
            '<div class="bfield"><label>חברה</label><input type="text" id="fCompany" autocomplete="organization" /></div>'+
          '</div>'+
          '<div class="frow">'+
            '<div class="bfield"><label>טלפון</label><input type="tel" id="fPhone" inputmode="tel" autocomplete="tel" /></div>'+
            '<div class="bfield"><label>אימייל</label><input type="email" id="fEmail" inputmode="email" autocomplete="email" /></div>'+
          '</div>'+
          '<div class="bfield"><label>כתובת</label><input type="text" id="fAddress" autocomplete="street-address" /></div>'+
          '<div class="bfield"><label>משהו שכדאי שנדע? (לא חובה)</label><textarea id="fNotes" rows="2"></textarea></div>'+
          '<input type="text" id="fHp" tabindex="-1" autocomplete="off" aria-hidden="true" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0" />'+
          '<label class="check"><input type="checkbox" id="fWantsCall" /><span><b>אשמח לדבר עם מנהל המכירות לפני חתימה</b>'+
            'שימו לב: סימון האפשרות יוציא אתכם מתהליך ההזמנה. נשמור את הפרטים שמילאתם ונחזור אליכם לשיחה אישית.</span></label>'+
          '<label class="check" id="consentRow"><input type="checkbox" id="fConsent" /><span><b>אישור קבלת דיוור</b>'+
            'אני מאשר/ת קבלת עדכונים, מבצעים ותכנים שיווקיים מעזרא בדוא״ל וב-SMS. ניתן להסיר בכל עת.</span></label>'+
          '<div class="consent-err" id="consentErr" hidden>יש לאשר קבלת דיוור כדי להמשיך.</div>'+
        '</div>'+
        '<div class="details__rcpt"><div class="receipt" id="detR">'+receiptPaperHTML(null)+'</div></div>'+
      '</div>'+
      '<div class="legal">בשליחת הטופס אני מאשר/ת את תנאי השימוש ומדיניות הפרטיות.</div>';
    body.classList.add('is-details');   // make .body a flex column so the two panels fill + scroll like step 5
    // prefill from state (so save/restore + back keep what was typed)
    const map={fName:'name',fCompany:'company',fPhone:'phone',fEmail:'email',fAddress:'address',fNotes:'notes'};
    Object.keys(map).forEach(id=>{const el=$(id);if(el)el.value=state[map[id]]||'';});
    const req=['fName','fPhone','fEmail'].map(id=>$(id));
    const validate=()=>{goBtn.disabled=!req.every(el=>el.value.trim());};
    body.querySelectorAll('input,textarea').forEach(el=>el.addEventListener('input',()=>{
      if(map[el.id]) state[map[el.id]]=el.value;
      validate(); saveMaybe();
    }));
    // clear the consent error once they tick it
    const cc=$('fConsent');
    if(cc) cc.addEventListener('change',()=>{ if(cc.checked){ const e=$('consentErr'),r=$('consentRow');
      if(e) e.hidden=true; if(r) r.classList.remove('check--err'); } });
    // "talk to sales before signing" = leave the booking flow → the abandon screen (which shows the disclaimer)
    const wc=$('fWantsCall');
    if(wc) wc.addEventListener('change',()=>{ if(wc.checked){ wc.checked=false; openTalk(6); } });
    validate();
    // scroll-cue on each column (shows only if that panel actually overflows); equal-height columns → arrows align
    ensureScrollCue($('detForm'));
    ensureScrollCue($('detR'));
  }

  /* ═══════ STEP 7 · confirmation ═══════ */
  function step7(){
    setFoot(null,null,null,false,false);   // confirmation: no CTA and no talk prompt
    body.innerHTML =
      '<div class="done">'+
        '<div class="done__badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>'+
        '<div class="dt">ההזמנה שלכם התקבלה</div>'+
        '<div class="hero">חוזה נשלח אליכם במייל</div>'+
        '<a class="done__cta" href="mailto:" aria-label="פתיחת אפליקציית המייל">'+
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>'+
          'קחו אותי למייל'+
        '</a>'+
        '<p class="done__play">החוזה כבר מחכה לך במייל - נשאר רק לחתום :)</p>'+
        '<div class="done__note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v6"/><path d="M12 16h.01"/></svg>'+
          '<span>שימו לב, החוזה שנשלח תקף ל-24 שעות בלבד. ללא חתימה על החוזה, לא נוכל לשריין את משבצת הזמן שהובטחה.</span></div>'+
        '<p class="done__fine">נחזור אליכם תוך 24 שעות כדי לאשר את הפרטים סופית ולגבות מקדמה. ייתכן שייקחו כמה רגעים למייל להגיע.</p>'+
      '</div>';
  }

  /* ═══════ TALK · leave-your-details (abandon the self-serve flow, talk to sales) ═══════ */
  const TALK_INFO='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M12 11v5"/></svg>';
  function openTalk(fromStep){
    inTalk=true; talkFromStep=fromStep||1;
    stopBubbles();
    $('progTxt').textContent='יצירת קשר';
    [...$('progDots').children].forEach(d=>d.classList.remove('on'));
    $('backBtn').hidden=false;
    body.className='body'; body.scrollTop=0; void body.offsetWidth; body.classList.add('anim-fwd');
    setFoot('שליחת הפרטים','', submitTalk, true, false);   // no talk-prompt on the talk screen itself
    body.innerHTML =
      '<div class="talk">'+
        '<div class="talk__note">'+TALK_INFO+
          '<div><b>אתם יוצאים מתהליך ההזמנה העצמית</b>'+
          '<span>בלי התחייבות. נשמור את מה שכבר מילאתם, ומנהל המכירות יחזור אליכם לתיאום אישי של האירוע.</span></div>'+
        '</div>'+
        '<h2 class="steptitle">נחזור אליכם</h2>'+
        '<p class="stepsub">השאירו פרטים ונתאם שיחה אישית</p>'+
        '<div class="talk__form">'+
          '<div class="frow">'+
            '<div class="bfield"><label>שם מלא</label><input type="text" id="tkName" autocomplete="name" /></div>'+
            '<div class="bfield"><label>טלפון</label><input type="tel" id="tkPhone" inputmode="tel" autocomplete="tel" /></div>'+
          '</div>'+
          '<div class="frow">'+
            '<div class="bfield"><label>אימייל</label><input type="email" id="tkEmail" inputmode="email" autocomplete="email" /></div>'+
            '<div class="bfield"><label>חברה (לא חובה)</label><input type="text" id="tkCompany" autocomplete="organization" /></div>'+
          '</div>'+
          '<div class="bfield"><label>משהו שכדאי שנדע? (לא חובה)</label><textarea id="tkNotes" rows="2"></textarea></div>'+
          '<input type="text" id="tkHp" tabindex="-1" autocomplete="off" aria-hidden="true" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0" />'+
          '<label class="check" id="tkConsentRow"><input type="checkbox" id="tkConsent" /><span><b>אישור קבלת דיוור</b>'+
            'אני מאשר/ת קבלת עדכונים, מבצעים ותכנים שיווקיים מעזרא בדוא״ל וב-SMS. ניתן להסיר בכל עת.</span></label>'+
          '<div class="consent-err" id="tkConsentErr" hidden>יש לאשר קבלת דיוור כדי להמשיך.</div>'+
        '</div>';
    const map={tkName:'name',tkPhone:'phone',tkEmail:'email',tkCompany:'company',tkNotes:'notes'};
    Object.keys(map).forEach(id=>{const el=$(id);if(el)el.value=state[map[id]]||'';});
    const req=['tkName','tkPhone','tkEmail'].map(id=>$(id));
    const validate=()=>{goBtn.disabled=!req.every(el=>el.value.trim());};
    body.querySelectorAll('input,textarea').forEach(el=>el.addEventListener('input',()=>{
      if(map[el.id]) state[map[el.id]]=el.value; validate(); saveMaybe();
    }));
    const cc=$('tkConsent');
    if(cc) cc.addEventListener('change',()=>{ if(cc.checked){ const e=$('tkConsentErr'),r=$('tkConsentRow');
      if(e) e.hidden=true; if(r) r.classList.remove('check--err'); } });
    validate();
  }
  function submitTalk(){
    const c=$('tkConsent');
    if(!c || !c.checked){
      const e=$('tkConsentErr'), r=$('tkConsentRow');
      if(e) e.hidden=false; if(r) r.classList.add('check--err');
      (e||r||c).scrollIntoView({behavior:'smooth',block:'center'});
      return;
    }
    state.notes=$('tkNotes').value;
    submitLead(true);          // callback lead (guards a missing plan/date)
    inTalk=false;
    callbackDone();
  }
  function callbackDone(){
    setFoot(null,null,null,false,false);
    $('progTxt').textContent='סיום';
    [...$('progDots').children].forEach(d=>d.classList.remove('on'));
    $('backBtn').hidden=true;
    body.className='body'; body.scrollTop=0; void body.offsetWidth; body.classList.add('anim-fwd');
    body.innerHTML =
      '<div class="done">'+
        '<div class="done__badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>'+
        '<div class="dt">קיבלנו את הפרטים</div>'+
        '<div class="hero">מנהל המכירות יחזור אליכם בהקדם</div>'+
        '<div class="done__note">'+TALK_INFO+
          '<span>שמרנו את מה שמילאתם עד כה. נחזור אליכם לתיאום אישי של האירוע, בלי התחייבות.</span></div>'+
      '</div>';
  }

  const STEPS={1:step1,2:step2,3:step3,4:step4,5:step5,6:step6,7:step7};

  // ── boot: opened from a package card (?plan=) → preselect it and jump to the WHEN step;
  //         otherwise restore a saved session if there is one, else start fresh ──
  (function boot(){
    // precedence: a saved in-progress session wins over a ?plan= deep-link, so an ad click never
    // clobbers a half-done booking. Only with no saved draft does ?plan= preselect and skip to step 2.
    let s=null; try{ s=JSON.parse(localStorage.getItem(SAVE_KEY)||'null'); }catch(e){}
    if(!s){
      const pplan=new URLSearchParams(location.search).get('plan');
      if(pplan && E.PLANS[pplan]){ state.plan=pplan; render(2); return; }
      render(1); return;
    }
    state.plan=(s.plan&&E.PLANS[s.plan])?s.plan:null; state.slot=s.slot||null; state.guests=s.guests||20;
    state.menu=s.menu||null; state.addons=s.addons||{}; state.foodNotes=s.foodNotes||''; state.notes=s.notes||'';
    state.name=s.name||''; state.company=s.company||''; state.phone=s.phone||''; state.email=s.email||''; state.address=s.address||'';
    if(s.date){ const d=new Date(s.date); if(!isNaN(d.getTime())){ d.setHours(0,0,0,0); state.date=d; view=new Date(d.getFullYear(),d.getMonth(),1); } }
    saveOn=true; if(saveChk) saveChk.checked=true;
    render(Math.min(Math.max(s.step||1,1),6));
  })();
})();
</script>
</body>
</html>
