<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<style>
  :root{
    --bg:#0f0d0b; --panel:#1b150f; --panel2:#120e0a; --cream:#f0ebe0; --cream-dim:rgba(240,235,224,.62);
    --cream-faint:rgba(240,235,224,.45);
    --gold:#c49a3c; --gold-light:#f5d98a; --line:rgba(196,154,60,.22);
    --font-body:'Heebo',sans-serif; --ease:cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--cream);font-family:var(--font-body);line-height:1.5;
    overflow:hidden;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;
    padding:clamp(.4rem,1.5vw,1.2rem)}
  .num{font-family:'Pliant',var(--font-body);font-variant-numeric:tabular-nums;direction:ltr;unicode-bidi:embed}
  button{font-family:inherit;cursor:pointer}

  /* ── ONE window: a fixed-height panel; steps advance inside it ── */
  .panel{width:100%;max-width:880px;height:min(94dvh,700px);display:flex;flex-direction:column;
    background:linear-gradient(170deg,var(--panel),var(--panel2));border:1px solid rgba(196,154,60,.25);
    border-radius:24px;overflow:hidden;box-shadow:0 30px 90px rgba(0,0,0,.65);position:relative}

  .bar{flex:none;display:flex;align-items:center;justify-content:space-between;gap:1rem;
    padding:.65rem 1rem;border-block-end:1px solid var(--line)}
  .bar__back{display:inline-flex;align-items:center;gap:.35rem;background:transparent;border:.5px solid var(--line);
    border-radius:999px;color:var(--cream-dim);font-size:.78rem;padding:.32rem .8rem;
    transition:color .2s,border-color .2s,opacity .2s}
  .bar__back:hover{color:var(--gold-light);border-color:var(--gold)}
  .bar__back[hidden]{display:none}
  .bar__prog{display:flex;align-items:center;gap:.55rem;font-size:.76rem;color:var(--cream-dim);white-space:nowrap;flex:none}
  .bar__prog #progTxt{white-space:nowrap}
  .bar__dots{display:flex;gap:.3rem;direction:ltr}
  .bar__dots i{width:7px;height:7px;border-radius:50%;background:rgba(240,235,224,.18);transition:background .3s var(--ease)}
  .bar__dots i.on{background:var(--gold)}
  .bar__brand{font-weight:700;font-size:1.05rem;color:var(--gold-light)}
  /* left of the bar: logo + an X to exit back to the website */
  .bar__end{display:flex;align-items:center;gap:.6rem}
  .bar__logo img{height:20px;width:auto;display:block}
  .bar__x{width:30px;height:30px;border-radius:8px;border:.5px solid var(--line);background:transparent;color:var(--cream-dim);
    display:inline-flex;align-items:center;justify-content:center;transition:color .2s var(--ease),border-color .2s var(--ease)}
  .bar__x:hover{color:var(--gold-light);border-color:var(--gold)}
  /* save-and-continue toggle (top bar) */
  .bar__start{display:flex;align-items:center;gap:.6rem;min-width:0}
  .bar__save{display:inline-flex;align-items:center;gap:.4rem;cursor:pointer;position:relative;font-size:.76rem;color:var(--cream-dim)}
  .bar__save input{position:absolute;opacity:0;width:0;height:0}
  /* bookmark toggle: outline = not saved, filled gold = saved. self-explanatory, so it works icon-only on mobile */
  .bar__save__box{flex:none;display:inline-flex;align-items:center;justify-content:center;transition:all .2s var(--ease)}
  .bar__save__box svg{width:15px;height:18px;fill:none;stroke:var(--cream-dim);stroke-width:1.7;stroke-linejoin:round;
    transition:fill .2s var(--ease),stroke .2s var(--ease)}
  .bar__save input:checked+.bar__save__box svg{fill:var(--gold);stroke:var(--gold)}
  .bar__save__label{white-space:nowrap}
  .bar__saved{position:absolute;inset-inline-start:0;top:calc(100% + 5px);white-space:nowrap;font-size:.68rem;color:#5fbf7f;
    opacity:0;transform:translateY(-3px);transition:opacity .3s var(--ease),transform .3s var(--ease);pointer-events:none}
  .bar__saved.show{opacity:1;transform:none}

  /* step body: internal scroll only (the page never scrolls) */
  .body{flex:1 1 auto;min-height:0;overflow-y:auto;position:relative;padding:clamp(1rem,2.5vw,1.6rem);
    scrollbar-width:thin;scrollbar-color:rgba(196,154,60,.5) transparent}
  .body::-webkit-scrollbar{width:8px}
  .body::-webkit-scrollbar-thumb{background:rgba(196,154,60,.45);border-radius:99px}
  /* forward / backward slide (directional, subtle) */
  .anim-fwd{animation:fwd .24s var(--ease)}
  .anim-back{animation:back .24s var(--ease)}
  @keyframes fwd{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:none}}
  @keyframes back{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:none}}

  /* fixed footer CTA: always visible, never clipped */
  /* footer stacks: the talk prompt sits above the primary CTA row, always inside the panel */
  .foot{flex:none;display:flex;flex-direction:column;gap:.55rem;padding:.7rem 1rem;
    border-block-start:1px solid var(--line);background:rgba(16,12,8,.55)}
  .foot[hidden]{display:none}
  .foot__main{display:flex;align-items:center;gap:.8rem}
  .foot__main[hidden]{display:none}
  .go{flex:1;background:var(--gold);border:none;border-radius:12px;color:#141009;font-weight:600;font-size:.98rem;
    padding:.72rem;transition:filter .2s,opacity .2s}
  .go:hover{filter:brightness(1.07)}
  .go:disabled{opacity:.38;cursor:not-allowed}
  .foot__hint{flex:none;font-size:.68rem;color:var(--cream-dim);max-width:34ch}
  /* talk prompt inside the footer - shown on every step before the details form (desktop + mobile) */
  .foot__talk{display:block;width:100%;text-align:center;background:transparent;border:1px dashed rgba(196,154,60,.5);
    border-radius:11px;color:var(--gold-light);font-size:.76rem;padding:.5rem .7rem;cursor:pointer;
    transition:border-color .2s,background .2s}
  .foot__talk[hidden]{display:none}
  .foot__talk:hover{border-color:var(--gold);background:rgba(196,154,60,.08)}

  .steptitle{text-align:center;font-weight:600;font-size:clamp(1.25rem,2.6vw,1.55rem);color:var(--cream);margin:0 0 .3rem}
  .stepsub{text-align:center;color:var(--cream-dim);font-size:.88rem;margin:0 0 1rem}
  .stepsub--gold{color:var(--gold-light);font-weight:600}

  /* ── step 1: plan cards ── */
  .plans{display:flex;flex-direction:column;gap:.7rem;max-width:380px;margin:8vh auto 0}
  .plan{display:flex;align-items:center;justify-content:space-between;gap:1rem;width:100%;
    padding:.95rem 1.1rem;border-radius:14px;border:1.5px solid var(--line);background:rgba(255,255,255,.03);
    color:var(--cream);font-size:1rem;font-weight:600;text-align:start;
    transition:transform .18s var(--ease),border-color .2s,background .25s}
  .plan small{display:block;font-size:.74rem;color:var(--cream-dim);font-weight:400}
  .plan .ph{font-family:'Pliant',var(--font-body);color:var(--gold-light);font-size:1.15rem;white-space:nowrap}
  .plan .ph small{font-family:var(--font-body);font-size:.66rem;text-align:center}
  .plan:hover{transform:translateY(-2px);border-color:var(--gold)}
  .plan.on{background:rgba(196,154,60,.14);border-color:var(--gold)}

  /* ── step 2: merged WHEN (calendar right + reactive sky left) — repurposed as-is ── */
  .when{display:flex;gap:1rem;align-items:stretch;min-height:0}
  .when__cal{flex:1.25 1 0;min-width:0}
  .when__sky{flex:1 1 0;min-width:0;display:flex;flex-direction:column}
  .when__div{flex:0 0 1px;align-self:stretch;
    background:linear-gradient(180deg,transparent,rgba(196,154,60,.35) 15%,rgba(196,154,60,.35) 85%,transparent)}
  .colhead{text-align:center;margin-block-end:.5rem}
  .colhead .t{font-weight:600;font-size:.98rem;color:var(--cream)}
  .colhead .s{font-size:.82rem;color:var(--cream-dim);min-height:1.2em}
  .colhead .s b{color:var(--gold)}
  .cal{max-width:340px;margin-inline:auto}
  .cal__head{display:flex;align-items:center;justify-content:space-between;margin-block-end:.5rem}
  .cal__nav{width:32px;height:32px;border-radius:9px;border:.5px solid var(--line);background:transparent;color:var(--gold);
    display:inline-flex;align-items:center;justify-content:center}
  .cal__nav:disabled{opacity:.3;cursor:not-allowed}
  .cal__month{font-weight:600;font-size:1rem;color:var(--cream)}
  .cal__grid{display:grid;grid-template-columns:repeat(7,1fr);gap:.18rem}
  .cal__dow{text-align:center;font-size:.6rem;color:var(--cream-dim);padding-block:.15rem}
  .cal__day{aspect-ratio:1/1;border-radius:7px;border:.5px solid transparent;background:rgba(255,255,255,.04);
    color:var(--cream);font-size:.78rem;font-family:'Pliant',var(--font-body);
    display:flex;align-items:center;justify-content:center;transition:border-color .2s,background .2s}
  .cal__day.is-empty{background:transparent}
  .cal__day.is-past{opacity:.28;cursor:not-allowed;background:transparent}
  .cal__day.is-booked{cursor:not-allowed;color:rgba(240,235,224,.4);
    background:repeating-linear-gradient(135deg,rgba(0,0,0,.3),rgba(0,0,0,.3) 4px,transparent 4px,transparent 8px)}
  .cal__day:not(.is-past):not(.is-booked):not(.is-empty):hover{border-color:var(--gold)}
  .cal__day.is-selected{background:var(--gold);color:#141009;font-weight:700}
  .cal__legend{display:flex;justify-content:center;gap:1rem;margin-block-start:.45rem;font-size:.68rem;color:var(--cream-dim)}
  .cal__legend i{display:inline-block;width:10px;height:10px;border-radius:3px;vertical-align:-1px;margin-inline-end:.3rem}
  .cal__legend .free{background:rgba(255,255,255,.12);border:1px solid var(--line)}
  .cal__legend .busy{background:repeating-linear-gradient(135deg,rgba(0,0,0,.5),rgba(0,0,0,.5) 3px,transparent 3px,transparent 6px);border:1px solid var(--line)}
  .sky{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;position:relative;border-radius:14px;overflow:hidden;
    border:1px solid var(--line);isolation:isolate}
  .sky::before{content:'';position:absolute;inset:0;z-index:-2;background:linear-gradient(180deg,#15110b 0%,#0a0805 100%)}
  .sky::after{content:'';position:absolute;inset:0;z-index:-1;
    background:radial-gradient(150px 100px at 50% 20px,var(--glow,rgba(255,206,120,.55)),transparent 72%);
    opacity:var(--mood,.55);transition:opacity .5s var(--ease),background .5s var(--ease)}
  .sky__arc{position:relative;height:50px;flex:none;border-block-end:1px solid rgba(196,154,60,.18)}
  .orb{position:absolute;bottom:8px;left:16%;width:24px;height:24px;margin-inline-start:-12px;
    transition:left .55s var(--ease),transform .55s var(--ease)}
  .orb .sun,.orb .moon{position:absolute;inset:0;border-radius:50%;transition:opacity .5s var(--ease)}
  .orb .sun{background:radial-gradient(circle,#fff3cf 0%,#ffd25e 55%,#f4a93c 100%);box-shadow:0 0 13px 3px rgba(255,206,94,.75)}
  .orb .moon{background:radial-gradient(circle at 64% 38%,#fdfaf0 0%,#e6e2d2 60%,#cfc9b4 100%);
    box-shadow:0 0 11px 2px rgba(220,224,255,.55);opacity:0}
  .sky[data-mood="night"] .orb .sun{opacity:0}
  .sky[data-mood="night"] .orb .moon{opacity:1}
  .sky__rows{flex:1 1 auto;display:flex;flex-direction:column;justify-content:center}
  .srow{position:relative;display:flex;align-items:center;justify-content:center;gap:.5rem;width:100%;min-height:38px;
    padding:.3rem .7rem;direction:ltr;background:transparent;border:0;border-block-end:1px solid rgba(255,255,255,.06);
    color:var(--cream);transition:background .2s}
  .srow:last-child{border-block-end:0}
  .srow svg{width:14px;height:14px;color:rgba(255,255,255,.82)}
  .srow .tm{font-family:'Pliant',var(--font-body);font-size:.82rem;white-space:nowrap}
  .srow .tk{font-size:.68rem;color:rgba(255,255,255,.6)}
  .srow:hover:not(.is-taken):not(.is-selected){background:rgba(255,255,255,.06)}
  .srow.is-selected{background:linear-gradient(90deg,rgba(245,217,138,.16),rgba(196,154,60,.09))}
  .srow.is-selected .tm{color:var(--gold-light);font-weight:600}
  .srow.is-selected::before{content:'';position:absolute;inset-inline-start:0;top:5px;bottom:5px;width:3px;background:var(--gold);border-radius:0 2px 2px 0}
  .srow.is-taken{cursor:not-allowed;opacity:.5}
  .srow.is-taken .tm{text-decoration:line-through}
  .sky.is-locked .srow{opacity:.42;pointer-events:none;filter:grayscale(.5)}
  .sky__cap{flex:none;text-align:center;font-size:.66rem;letter-spacing:.05em;color:var(--cream-dim);
    padding-block:.35rem;border-block-start:1px solid rgba(255,255,255,.05)}

  /* ── step 3 (hybrid): slim command band + always-visible notes + flex-fill menu board ── */
  /* the whole step is a flex column that exactly fills the frame; only the menu board scrolls, if ever */
  .menu3{height:100%;min-height:0;display:flex;flex-direction:column;gap:.55rem}
  .menu3__band{flex:none;display:flex;align-items:center;justify-content:space-between;gap:1rem}
  .menu3__title h2{font-weight:600;font-size:clamp(1.1rem,2.4vw,1.4rem);color:var(--cream);margin:0}
  .menu3__title p{font-size:.8rem;color:var(--gold-light);font-weight:600;margin:.12rem 0 0}
  /* day/eve = a clear two-button segmented control (NOT a slider) */
  .menu-seg{flex:none;display:flex;gap:.35rem;padding:.25rem;border-radius:13px;
    border:1px solid var(--line);background:rgba(255,255,255,.02)}
  .menu-seg__opt{display:flex;align-items:center;gap:.4rem;padding:.5rem .9rem;border-radius:9px;cursor:pointer;
    border:0;background:transparent;color:var(--cream-dim);font-family:var(--font-body);font-size:.86rem;font-weight:600;
    transition:background .25s var(--ease),color .25s var(--ease),box-shadow .25s var(--ease)}
  .menu-seg__opt svg{width:16px;height:16px;flex:none}
  .menu-seg__opt:hover:not(.is-active){color:var(--cream)}
  .menu-seg__opt--day.is-active{background:linear-gradient(150deg,#f6e3b4,#e9bf72);color:#4a360f;
    box-shadow:0 5px 16px -7px rgba(233,191,114,.75)}
  .menu-seg__opt--eve.is-active{background:linear-gradient(150deg,#2a2d63,#16183a);color:#f3e6c0;
    box-shadow:0 5px 16px -7px rgba(40,44,110,.85)}
  .menu-seg__opt--eve.is-active svg{color:var(--gold-light)}
  /* option 2: notes collapse to ONE quiet, borderless hint line (no box) */
  .menu-hints{flex:none;margin:0;padding:0;text-align:center;color:var(--cream-dim);font-size:.74rem;line-height:1.5}
  .menu-hints svg{width:13px;height:13px;color:var(--gold);vertical-align:-2px;margin-inline-end:.3rem}
  /* the food-notes field docks slim at the bottom, full width, no big top margin */
  .menu3 .bfield{flex:none;max-width:none;margin:0}
  .menu3 .bfield label{margin-block-end:.25rem}
  .menu3 .bfield textarea{min-height:40px}
  /* menu board FILLS the remaining height and scrolls internally only if a menu is unusually long */
  .menu-view{flex:1 1 auto;min-height:0;overflow-y:auto;margin:0;position:relative;
    scrollbar-width:thin;scrollbar-color:rgba(196,154,60,.5) transparent}
  .menu-view::-webkit-scrollbar{width:6px}
  .menu-view::-webkit-scrollbar-thumb{background:rgba(196,154,60,.4);border-radius:99px}
  .menu-view__inner{display:flex;flex-direction:column;gap:.6rem;padding-inline-end:.2rem}
  .menu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem}
  .menu-drinks{display:grid;grid-template-columns:repeat(2,1fr);gap:.7rem}
  .menu-card{background:rgba(196,154,60,.05);border:1px solid var(--line);border-radius:12px;padding:.6rem .65rem;text-align:center}
  .menu-card--hero{background:linear-gradient(160deg,rgba(196,154,60,.16),rgba(196,154,60,.04));border-color:rgba(196,154,60,.4)}
  /* day menu = golden boxes; evening = blue/moon theme (matches the day/eve toggle) */
  .menu-view.is-day .menu-card{background:linear-gradient(160deg,rgba(245,217,138,.2),rgba(196,154,60,.07));border-color:rgba(196,154,60,.45)}
  .menu-view.is-day .menu-card--hero{background:linear-gradient(160deg,rgba(245,217,138,.28),rgba(196,154,60,.12));border-color:rgba(196,154,60,.55)}
  .menu-view:not(.is-day) .menu-card:not(.menu-card--hero){background:linear-gradient(160deg,rgba(64,68,142,.5),rgba(26,28,66,.72));border-color:rgba(122,128,214,.42)}
  .menu-view:not(.is-day) .menu-card--hero{background:linear-gradient(160deg,rgba(74,79,158,.55),rgba(30,33,76,.78));border-color:rgba(130,136,224,.5)}
  .menu-card__t{display:flex;align-items:center;justify-content:center;gap:.45rem;color:var(--gold-light);font-weight:600;font-size:.86rem;margin-block-end:.45rem}
  .menu-card__t::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--gold);flex:none}
  .menu-dishes{display:flex;flex-direction:column;align-items:stretch;gap:.32rem}
  .menu-card--wide .menu-dishes{display:grid;grid-template-columns:repeat(2,1fr);gap:.42rem 1.1rem}
  .menu-dish{display:flex;align-items:flex-start;justify-content:center;gap:.4rem;color:var(--cream-dim);font-size:.83rem;line-height:1.35;text-align:center}
  .menu-dish__mark{flex:none;width:11px;height:11px;margin-block-start:.26rem;color:var(--gold)}
  .menu-dish--desc{flex-direction:column;align-items:center;gap:.1rem;text-align:center}
  .menu-dish--desc .menu-dish__nm{color:var(--gold-light);font-weight:600;font-size:.85rem;line-height:1.3}
  .menu-dish--desc .menu-dish__ds{color:var(--cream-faint);font-size:.74rem;line-height:1.4}
  /* step-4 header: right-aligned above the slider it describes (not centered) */
  .s4head{text-align:start;margin-block-end:.2rem}
  .s4head h2{font-weight:600;font-size:clamp(1.2rem,2.4vw,1.45rem);color:var(--cream);margin:0}
  .s4head p{font-size:.82rem;color:var(--cream-dim);margin:.25rem 0 0}
  .bfield{max-width:66ch;margin:1.1rem auto 0}
  .bfield label{display:block;font-size:.8rem;color:var(--cream-dim);margin-block-end:.35rem}
  .bfield textarea,.bfield input{width:100%;background:rgba(255,255,255,.05);border:.5px solid var(--line);border-radius:9px;
    color:var(--cream);font-family:inherit;font-size:.9rem;padding:.55rem .7rem}
  .bfield textarea:focus,.bfield input:focus{outline:none;border-color:var(--gold)}
  .bfield textarea{resize:none;min-height:56px}

  /* ── step 4: guests + add-ons, coupe + live long receipt ── */
  /* two groups: LEFT-in-flow controls (slider + add-ons), RIGHT-in-flow live summary (coupe crowns the receipt) */
  /* step-4 grid: desktop = slider+addons (left) · coupe-hero+receipt (right);
     mobile = slider → coupe-hero → addons → receipt (coupe reacts right under the bar) */
  .calcgrid{display:grid;gap:.95rem 1.3rem;min-height:0;height:100%;
    grid-template-columns:1fr 1fr;grid-template-rows:auto minmax(0,1fr);
    grid-template-areas:"slider hero" "addons receipt"}
  .cg-slider{grid-area:slider;align-self:center}
  .cg-hero{grid-area:hero}
  /* padding-block-end matches the receipt's 1rem so the two scroll-cue arrows rest at the same height */
  .cg-addons{grid-area:addons;min-height:0;overflow-y:auto;position:relative;padding-inline-end:.3rem;padding-block-end:1rem;
    scrollbar-width:thin;scrollbar-color:rgba(196,154,60,.5) transparent}
  .cg-addons::-webkit-scrollbar{width:6px}
  .cg-addons::-webkit-scrollbar-thumb{background:rgba(196,154,60,.4);border-radius:99px}
  .cg-rcpt{grid-area:receipt;min-height:0;display:flex}
  .cg-rcpt .rcpt{flex:1 1 auto;min-height:0;overflow-y:auto;margin:0;
    scrollbar-width:thin;scrollbar-color:rgba(196,154,60,.5) transparent}
  .cg-rcpt .rcpt::-webkit-scrollbar{width:6px}
  .cg-rcpt .rcpt::-webkit-scrollbar-thumb{background:rgba(196,154,60,.4);border-radius:99px}
  /* coupe + total, framed together as the live meter */
  .summary-hero{display:flex;align-items:center;justify-content:center;gap:1.2rem;
    padding:.7rem 1rem;border:.5px solid var(--line);border-radius:14px;background:rgba(196,154,60,.06)}
  .summary-hero .glass-wrap{width:clamp(66px,13vw,84px);flex:none;margin:0}
  .summary-hero__tot{font-family:'Pliant',var(--font-body);font-size:1.8rem;color:var(--gold-light);line-height:1;text-align:center}
  .summary-hero__tot small{display:block;font-family:var(--font-body);font-size:.7rem;color:var(--cream-dim);font-weight:400;margin-block-start:.25rem}
  .gslide{display:flex;align-items:center;gap:.7rem}
  .gslide input[type=range]{flex:1;appearance:none;-webkit-appearance:none;height:6px;border-radius:6px;
    background:rgba(196,154,60,.25)}
  .gslide input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;
    background:var(--gold);border:2px solid #141009;box-shadow:0 0 10px rgba(196,154,60,.6);cursor:grab}
  /* the guests count is a keyboard-editable number input */
  .gslide .gv{font-family:'Pliant',var(--font-body);font-size:1.4rem;color:var(--gold-light);width:3.2ch;text-align:center;
    background:transparent;border:0;border-block-end:1px solid transparent;padding:0;-moz-appearance:textfield}
  .gslide .gv:focus{outline:none;border-block-end-color:var(--gold)}
  .gslide .gv::-webkit-outer-spin-button,.gslide .gv::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .subhead{font-size:.95rem;font-weight:600;color:var(--cream);margin:0}
  .subhead small{display:block;font-size:.76rem;color:var(--cream-dim);font-weight:400}
  .addons{display:flex;flex-direction:column;gap:.55rem}
  .addon{display:flex;align-items:flex-start;gap:.7rem;cursor:pointer;width:100%;
    padding:.8rem .9rem;border-radius:13px;text-align:start;font-family:var(--font-body);color:var(--cream);
    border:1.5px solid var(--line);background:rgba(255,255,255,.02);
    transition:border-color .2s var(--ease),background .25s var(--ease),transform .15s var(--ease)}
  .addon:hover{transform:translateY(-1px);border-color:rgba(196,154,60,.45)}
  .addon.is-on{border-color:var(--gold);background:rgba(196,154,60,.1)}
  .addon__box{flex:none;width:22px;height:22px;margin-block-start:1px;border-radius:7px;
    border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--bg);transition:all .2s var(--ease)}
  .addon.is-on .addon__box{background:var(--gold);border-color:var(--gold)}
  .addon__box svg{width:14px;height:14px;opacity:0;transition:opacity .2s var(--ease)}
  .addon.is-on .addon__box svg{opacity:1}
  .addon__body{flex:1;min-width:0}
  .addon__top{display:flex;justify-content:space-between;align-items:baseline;gap:.6rem}
  .addon__label{font-weight:600;color:var(--cream);font-size:.95rem}
  .addon__price{font-size:.85rem;color:var(--gold-light);white-space:nowrap}
  .addon__desc{color:var(--cream-dim);font-size:.8rem;line-height:1.45;margin-block-start:.2rem;text-align:start}
  .addon__grow{color:var(--gold-light);font-weight:500}
  .glass-wrap{position:relative;width:clamp(100px,24vw,124px);aspect-ratio:140/180;margin:0}
  .glass-svg{width:100%;height:100%;display:block;overflow:visible}
  #bookLiquid{transition:y .45s var(--ease)}
  #bookLiquidTop{transition:cy .45s var(--ease),rx .45s var(--ease)}
  .coupetot{text-align:center;font-family:'Pliant',var(--font-body);font-size:1.35rem;color:var(--gold-light)}
  .coupetot small{display:block;font-family:var(--font-body);font-size:.66rem;color:var(--cream-dim);font-weight:400}

  /* long receipt (shared 4/5) */
  .rcpt{border:.5px solid var(--line);border-radius:14px;background:rgba(196,154,60,.05);padding:1rem 1.1rem;font-size:.86rem;position:relative}
  .rcpt .rt{font-weight:700;font-size:1.02rem;color:var(--gold-light);text-align:center;margin-block-end:.6rem}
  .rcpt .rr{display:flex;justify-content:space-between;gap:1rem;padding-block:.3rem;
    border-block-end:1px dashed rgba(196,154,60,.18);color:var(--cream-dim)}
  .rcpt .rr b{color:var(--cream)}
  .rcpt .sect{font-size:.72rem;font-weight:600;letter-spacing:.04em;color:var(--gold);
    padding-block:.45rem .15rem;border-block-end:1px dashed rgba(196,154,60,.18)}
  .rcpt .fr{display:flex;justify-content:space-between;gap:.8rem;padding-block:.24rem;font-size:.78rem;
    border-block-end:1px dashed rgba(196,154,60,.12);color:var(--cream-dim)}
  .rcpt .fr b{color:var(--cream);font-weight:500;white-space:nowrap}
  .rcpt .fr b .num{color:var(--gold-light);font-size:.9rem}
  .rcpt .grand{margin-block-start:.4rem;padding-block-start:.55rem;border-block-start:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:baseline;color:var(--cream)}
  .rcpt .grand .v{font-family:'Pliant',var(--font-body);font-size:1.5rem;color:var(--gold-light)}

  /* ── step 5: details + receipt side by side — both columns are equal-height scroll-boxes (like step 4),
       so each shows its own scroll-cue arrow at the same bottom line instead of one floating mid-page ── */
  .body.is-details{display:flex;flex-direction:column}
  .body.is-details .details{flex:1 1 auto;min-height:0}
  .details{display:flex;gap:1.2rem;align-items:stretch}
  /* padding-block-end matches the receipt's 1rem so the two scroll-cue arrows rest at the same height */
  .details__form{flex:1.1 1 0;min-width:0;min-height:0;overflow-y:auto;overflow-x:hidden;position:relative;
    display:flex;flex-direction:column;gap:.85rem;padding-inline-end:.2rem;padding-block-end:1rem;
    scrollbar-width:thin;scrollbar-color:rgba(196,154,60,.5) transparent}
  .details__form::-webkit-scrollbar{width:6px}
  .details__form::-webkit-scrollbar-thumb{background:rgba(196,154,60,.4);border-radius:99px}
  .details__form .bfield{max-width:none;margin:0}
  .details__form .frow{margin:0}
  .details__rcpt{flex:1 1 0;min-width:0;min-height:0;display:flex}
  .details__rcpt .rcpt{flex:1 1 auto;min-height:0;overflow-y:auto;margin:0;
    scrollbar-width:thin;scrollbar-color:rgba(196,154,60,.5) transparent}
  .details__rcpt .rcpt::-webkit-scrollbar{width:6px}
  .details__rcpt .rcpt::-webkit-scrollbar-thumb{background:rgba(196,154,60,.4);border-radius:99px}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
  .check{display:flex;gap:.55rem;align-items:flex-start;margin-block-start:.7rem;font-size:.76rem;color:var(--cream-dim);cursor:pointer}
  /* mandatory-consent error state */
  .check--err{outline:1px solid rgba(224,115,111,.6);outline-offset:4px;border-radius:8px}
  .check--err b{color:#e0736f}
  .check--err input{accent-color:#e0736f}
  .consent-err{color:#e0736f;font-size:.74rem;margin-block-start:.4rem}
  .consent-err[hidden]{display:none}
  .check input{margin-block-start:.2rem;accent-color:var(--gold)}
  .check b{color:var(--cream);display:block;font-size:.8rem}
  .legal{font-size:.68rem;color:var(--cream-dim);text-align:center;margin-block-start:.6rem}

  /* ── talk / leave-your-details (abandon the self-serve flow) ── */
  .talk{max-width:560px;margin:0 auto}
  .talk__note{display:flex;gap:.6rem;align-items:flex-start;margin:0 0 1.1rem;
    border:.5px solid rgba(196,154,60,.4);border-radius:12px;background:rgba(196,154,60,.06);padding:.7rem .9rem}
  .talk__note svg{width:18px;height:18px;color:var(--gold);flex:none;margin-block-start:2px}
  .talk__note b{display:block;color:var(--gold-light);font-size:.9rem;margin-block-end:.15rem}
  .talk__note span{color:var(--cream-dim);font-size:.8rem;line-height:1.5}
  .talk__form{display:flex;flex-direction:column;gap:.85rem}
  .talk__form .bfield{max-width:none;margin:0}
  .talk__form .frow{margin:0}

  /* ── confirmation ── */
  /* confirmation: focal animated green check + clear mail CTA, secondary copy tucked as fine print */
  .done{max-width:420px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;gap:.05rem;padding-block:1.2rem}
  .done__badge{position:relative;width:78px;height:78px;border-radius:50%;margin-block-end:1.1rem;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle,rgba(79,202,127,.22),transparent 72%);border:2px solid #4fca7f;
    animation:badgePop .45s var(--ease) both}
  .done__badge svg{width:40px;height:40px;color:#7fe0a3}
  .done__badge svg path{stroke-dasharray:30;stroke-dashoffset:30;animation:checkDraw .5s .22s var(--ease) forwards}
  .done__badge::after{content:'';position:absolute;inset:-5px;border-radius:50%;border:2px solid rgba(79,202,127,.55);
    animation:ringPulse 1s .28s var(--ease) both}
  @keyframes badgePop{0%{transform:scale(.55);opacity:0}62%{transform:scale(1.09)}100%{transform:scale(1);opacity:1}}
  @keyframes checkDraw{to{stroke-dashoffset:0}}
  @keyframes ringPulse{0%{transform:scale(.92);opacity:.85}100%{transform:scale(1.45);opacity:0}}
  .done .dt{font-weight:700;font-size:1.4rem;color:var(--cream)}
  .done .hero{color:var(--gold-light);font-weight:600;font-size:1.02rem;margin-block-start:.35rem}
  .done__cta{margin-block:1.2rem .5rem;display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
    background:linear-gradient(180deg,#5fd98a,#3fb56e);color:#0e2417;font-weight:700;font-size:1rem;
    padding:.72rem 1.5rem;border-radius:12px;text-decoration:none;box-shadow:0 10px 24px -10px rgba(79,202,127,.7);
    transition:filter .2s var(--ease),transform .15s var(--ease)}
  .done__cta:hover{filter:brightness(1.06);transform:translateY(-1px)}
  .done__cta svg{width:18px;height:18px}
  .done__play{font-size:.8rem;color:var(--gold-light);margin-block-end:1rem}
  .done__note{display:flex;gap:.45rem;align-items:flex-start;text-align:start;max-width:44ch;
    border:.5px solid rgba(196,154,60,.4);border-radius:11px;padding:.6rem .8rem;font-size:.76rem;color:var(--cream-dim);line-height:1.45}
  .done__note svg{width:15px;height:15px;color:var(--gold);flex:none;margin-block-start:2px}
  .done__fine{font-size:.72rem;color:var(--cream-faint,rgba(240,235,224,.42));line-height:1.5;max-width:46ch;margin-block-start:.9rem}
  @media (prefers-reduced-motion: reduce){
    .done__badge,.done__badge svg path,.done__badge::after{animation:none}
    .done__badge svg path{stroke-dashoffset:0}
  }

  /* scroll-cue: a pulsing gold glow behind a bouncing chevron, tells guests a panel keeps going below the fold.
     sticky (not absolute) so it tracks the scroll viewport's true edge in nested flex/grid panels;
     no dark band (nothing to hide the text underneath); only the arrow itself is clickable, the rest lets taps through. */
  /* accent is night/indigo by default (contrasts the warm gold panels); the evening-menu override below flips it to gold */
  .scrollcue{--cue:#aab1f4;--cue-hi:#d3d7ff;--cue-glow:rgba(140,150,240,.9);--cue-ring:rgba(132,142,232,.58);
    position:sticky;inset-inline:0;bottom:0;width:100%;height:34px;border:0;margin:0;background:none;
    display:flex;align-items:flex-end;justify-content:center;padding-block-end:.3rem;
    color:var(--cue);opacity:0;pointer-events:none;transition:opacity .25s var(--ease);z-index:2}
  .scrollcue.is-visible{opacity:1}
  .scrollcue__wrap{position:relative;display:flex;align-items:center;justify-content:center;width:28px;height:28px;
    pointer-events:none}
  .scrollcue.is-visible .scrollcue__wrap{pointer-events:auto;cursor:pointer}
  .scrollcue__wrap:hover{color:var(--cue-hi)}
  .scrollcue__ring{position:absolute;inset:0;border-radius:50%;
    background:radial-gradient(circle,var(--cue-ring),transparent 68%);animation:cueRingPulse 1.7s ease-out infinite}
  .scrollcue__arrow{position:relative;width:16px;height:16px;animation:cueBounce 1.5s ease-in-out infinite;
    filter:drop-shadow(0 0 5px var(--cue-glow)) drop-shadow(0 1px 2px rgba(0,0,0,.5))}
  /* evening menu = blue boxes → keep the arrow gold so it still contrasts */
  .menu-view:not(.is-day) > .scrollcue{--cue:var(--gold);--cue-hi:var(--gold-light);--cue-glow:rgba(196,154,60,.9);--cue-ring:rgba(196,154,60,.55)}
  @keyframes cueBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}
  @keyframes cueRingPulse{0%{transform:scale(.55);opacity:.8}100%{transform:scale(2.1);opacity:0}}

  /* mobile: same single window; sections stack, body scrolls internally */
  @media(max-width:720px){
    body{padding:.4rem}
    .panel{height:100dvh;border-radius:16px}
    /* panels aren't bounded scroll-boxes on mobile (the whole page scrolls) → no scroll-cue arrows */
    .scrollcue{display:none}
    .bar{padding:.5rem .7rem}
    .bar__save__label{display:none}
    #progTxt{display:none}   /* dots already show progress; drop the "Step X of N" text to de-cram the mobile header */
    .body{padding:.8rem .8rem 1.1rem}
    .plans{margin-block-start:3vh}
    .when{flex-direction:column;gap:.7rem}
    .when__div{display:none}
    .cal{max-width:290px}
    .cal__day{font-size:.7rem}
    .sky__arc{height:42px}
    .srow{min-height:34px}
    .menu-grid,.menu-drinks{grid-template-columns:1fr}
    .menu-card--wide .menu-dishes{grid-template-columns:1fr}
    /* step3: let it flow with the page (mobile scrolls); band stacks; segmented toggle goes full-width */
    .menu3{height:auto}
    .menu-view{overflow:visible}
    .menu3__band{flex-direction:column;align-items:stretch;gap:.5rem}
    .menu3__title{text-align:center}
    .menu-seg{width:100%}
    .menu-seg__opt{flex:1;justify-content:center}
    /* step4 stacks: slider → coupe+total → add-ons → receipt (coupe reacts right under the bar) */
    .calcgrid{grid-template-columns:1fr;grid-template-rows:none;height:auto;
      grid-template-areas:"slider" "hero" "addons" "receipt"}
    .cg-addons{overflow:visible}
    .cg-rcpt .rcpt{overflow:visible}
    .summary-hero{gap:1rem}
    .summary-hero .glass-wrap{width:70px}
    /* step5 stacks and scrolls with the page — never bounded scroll columns on mobile.
       flex:none keeps the panels at natural height (flex-basis:0 + min-height:0 would collapse and overlap them)
       while preserving the flex gaps between panels and between fields. */
    .body.is-details{display:block}
    .details{flex-direction:column;height:auto}
    .details__form{flex:none;overflow:visible;min-height:auto;padding-inline-end:0;padding-block-end:0}
    .details__rcpt{flex:none;position:static;width:100%;min-height:auto}
    .details__rcpt .rcpt{flex:none;overflow:visible;min-height:auto}
    .frow{grid-template-columns:1fr}
    .foot{gap:.5rem;padding:.55rem .7rem calc(.6rem + env(safe-area-inset-bottom))}
    .foot__hint{display:none}
  }
  @media (prefers-reduced-motion: reduce){
    .anim-fwd,.anim-back,.orb,.orb .sun,.orb .moon,.sky::after,#liq,.bub{animation:none;transition:none}
    .scrollcue__arrow,.scrollcue__ring{animation:none}
  }
</style>
</head>
<body>

<div class="panel">
  <div class="bar">
    <div class="bar__start">
      <button class="bar__back" id="backBtn" type="button" hidden>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
        Back
      </button>
      <label class="bar__save" id="saveTog" title="You can save here at any step and continue later">
        <input type="checkbox" id="saveChk" />
        <span class="bar__save__box"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z"/></svg></span>
        <span class="bar__save__label">Save</span>
        <span class="bar__saved" id="savedFlash">Saved successfully</span>
      </label>
    </div>
    <div class="bar__prog">
      <span id="progTxt"></span>
      <span class="bar__dots" id="progDots"><i></i><i></i><i></i><i></i><i></i></span>
    </div>
    <div class="bar__end">
      <button class="bar__x" id="exitBtn" type="button" aria-label="Close and return to the site">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <div class="body" id="body"></div>

  <div class="foot" id="foot" hidden>
    <button class="foot__talk" id="talkBtn" type="button">Prefer to talk before booking? Leave your details and we'll get back to you</button>
    <div class="foot__main" id="footMain">
      <button class="go" id="goBtn" type="button">Continue</button>
      <span class="foot__hint" id="footHint"></span>
    </div>
  </div>
</div>

<script src="english-ezra-booking-engine.js"></script>
<script>
(function(){
  const E = window.EzraEngine;
  const $ = id=>document.getElementById(id);
  const body = $('body'), foot = $('foot'), goBtn = $('goBtn'), footHint = $('footHint');

  // ── state: same shape as the site ──
  const state = { plan:null, date:null, slot:null, guests:20, menu:null, addons:{}, foodNotes:'', notes:'',
    name:'', company:'', phone:'', email:'', address:'' };
  let step = 1, lastStep = 0;
  let inTalk = false, talkFromStep = 1;   // the abandon / "leave your details" screen (not a numbered step)

  // ── save-and-continue (top bar) — ON by default: the process auto-saves at every step ──
  const SAVE_KEY='ezraProto2';
  let saveOn=true;
  const saveChk=$('saveChk'), savedFlash=$('savedFlash');
  if(saveChk) saveChk.checked=true;
  function collectState(){ return { plan:state.plan, date:state.date?key(state.date):null, slot:state.slot, guests:state.guests,
    menu:state.menu, addons:state.addons, foodNotes:state.foodNotes, notes:state.notes,
    name:state.name, company:state.company, phone:state.phone, email:state.email, address:state.address, step }; }
  function saveProgress(){ try{ localStorage.setItem(SAVE_KEY,JSON.stringify(collectState())); }catch(e){} }
  function saveMaybe(){ if(saveOn) saveProgress(); }
  function clearSave(){ try{ localStorage.removeItem(SAVE_KEY); }catch(e){} }
  let flashT;
  function flashSaved(){ if(!savedFlash)return; savedFlash.classList.add('show'); clearTimeout(flashT);
    flashT=setTimeout(()=>savedFlash.classList.remove('show'),1800); }
  if(saveChk) saveChk.addEventListener('change',()=>{ saveOn=saveChk.checked; if(saveOn){saveProgress();flashSaved();} else clearSave(); });

  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const pad=n=>String(n).padStart(2,'0');
  const key=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  const humanDate=d=>DOW[d.getDay()]+', '+pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear();
  const fmt=n=>'₪'+Math.round(n||0).toLocaleString('en-US');
  const today=new Date(); today.setHours(0,0,0,0);

  // BOOKED/BUSY come live from Monday via the shared worker (Events Form committed groups + Company
  // Events Form held groups). BUSY carries the real [date,start,end] per event so slots block only
  // the actual overlapping hours instead of the whole day. Re-renders step 2 in place if it's the
  // step currently on screen when the fetch resolves.
  const BOOKED=[], BUSY=[];
  (function loadAvailability(){
    const ep=window.EZRA_AVAILABILITY_ENDPOINT; if(!ep) return;
    fetch(ep,{method:'GET'}).then(r=>r.ok?r.json():null).then(j=>{
      if(!j) return;
      BOOKED.length=0; (j.booked||[]).forEach(dt=>BOOKED.push(dt));
      BUSY.length=0; (j.busy||[]).forEach(w=>{ if(w&&w.date&&w.start&&w.end) BUSY.push(w); });
      if(step===2){ renderCal(); renderSky(); }
    }).catch(()=>{});
  })();
  // "09:00-14:00" -> [startHour, endHour] with midnight rollover (02:00 end -> 26)
  const parseSlot=s=>{const a=s.split('-');const sh=parseInt(a[0],10);let eh=parseInt(a[1],10);if(eh<=sh)eh+=24;return [sh,eh];};
  const hmToFloat=hm=>{const m=/^(\d{1,2}):(\d{2})$/.exec(hm||'');return m?(+m[1])+(+m[2])/60:null;};
  // real per-slot conflict check against BUSY (replaces the old fake/random demo logic)
  function takenSlots(dateKey,list){
    const dayBusy=BUSY.filter(w=>w.date===dateKey);
    const taken=new Set();
    if(!dayBusy.length) return taken;
    list.forEach((label,i)=>{
      const [ss,se]=parseSlot(label);
      const hit=dayBusy.some(w=>{
        const ws=hmToFloat(w.start), we0=hmToFloat(w.end);
        if(ws==null||we0==null) return false;
        const we=we0<=ws?we0+24:we0;             // busy window rolls past midnight (e.g. 21:00-02:00)
        return ss<we && ws<se;                    // standard interval-overlap test
      });
      if(hit) taken.add(i);
    });
    return taken;
  }
  // a date is fully booked only when EVERY slot for the currently chosen plan is taken -
  // a partial-day conflict leaves the day pickable with some slots open.
  function isDateFullyBooked(dateKey){
    const plan=E.PLANS[state.plan]; if(!plan) return false;
    const list=E.SLOTS[plan.hours]||[];
    if(!list.length) return false;
    return takenSlots(dateKey,list).size>=list.length;
  }

  let liquidEl=null, liquidTopEl=null, bubblesGroup=null, bubbles=[], bubbleRAF=null, liqSurfaceY=LIQ_LOW, bubbleTarget=3;

  function seedBubble(b){ b.y=BOWL_BOT_Y-1-Math.random()*4; b.x=70+(Math.random()-.5)*halfWidth(b.y)*.8;

    const top=liqSurfaceY+2, span=Math.max(1,BOWL_BOT_Y-top);

  function checkScrollCue(el){

        '<div class="cg-addons" id="cgAddons">'+
          '<p class="subhead">Event add-ons<small>Check what to add - you can also continue without any</small></p>'+
          '<div class="addons" id="addons" style="margin-block-start:.55rem">'+addonRows+'</div>'+
        '</div>'+
        '<div class="cg-rcpt"><div class="rcpt" id="liveR"><div id="liveRInner"></div></div></div>'+
      '</div>';
    const gr=$('gr'), gv=$('gv');
    gv.value=state.guests;
    // slider drag → number; keyboard type → slider (clamped 20-50)
    gr.addEventListener('input',()=>{state.guests=+gr.value;gv.value=gr.value;refreshLive();saveMaybe();});
    const commitGv=()=>{let n=parseInt(gv.value,10);if(isNaN(n))n=20;n=Math.min(50,Math.max(20,n));
      state.guests=n;gv.value=n;gr.value=n;refreshLive();saveMaybe();};
    gv.addEventListener('input',()=>{const n=parseInt(gv.value,10);if(!isNaN(n)){state.guests=Math.min(50,Math.max(20,n));gr.value=state.guests;refreshLive();}});
    gv.addEventListener('blur',commitGv);
    gv.addEventListener('keydown',e=>{if(e.key==='Enter'){commitGv();gv.blur();}});
    $('addons').addEventListener('click',e=>{
      const b=e.target.closest('.addon'); if(!b)return;
      const id=b.dataset.id; state.addons[id]=!state.addons[id];
      // flower arrangements are mutually exclusive - only one tier at a time (same as the site)
      if(state.addons[id]&&(id==='flowers1'||id==='flowers2')){
        const other=id==='flowers1'?'flowers2':'flowers1';
        if(state.addons[other]){ state.addons[other]=false;
          const ob=$('addons').querySelector('.addon[data-id="'+other+'"]');
          if(ob){ob.classList.remove('is-on');ob.setAttribute('aria-pressed','false');}}
      }
      b.classList.toggle('is-on',!!state.addons[id]);
      b.setAttribute('aria-pressed',!!state.addons[id]);
      refreshLive();
    });
    setupCoupe();
    refreshLive();
    startBubbles();
    ensureScrollCue($('cgAddons'));
  }
  function updateCoupe(){
    const f=Math.min(Math.max((state.guests-20)/30,0),1);
    liqSurfaceY=LIQ_LOW-f*(LIQ_LOW-LIQ_HIGH);
    bubbleTarget=Math.round(3+f*13);   // 3 bubbles at 20 guests → 16 at 50
    if(liquidEl){ liquidEl.setAttribute('y',liqSurfaceY.toFixed(1));
      liquidTopEl.setAttribute('cy',liqSurfaceY.toFixed(1));
      liquidTopEl.setAttribute('rx',(halfWidth(liqSurfaceY)-1.5).toFixed(1)); }
  }
  function receiptInner(){
    const t=totals(); const p=E.PLANS[state.plan];
    const addRows=selectedAddons().map(a=>'<div class="rr"><span>'+a.label+'</span><b class="num">'+fmt(E.addonUnitPrice(a,t.g))+'</b></div>').join('');
    let bar='', food='';
    E.menuFor(state.plan,state.menu||'day').forEach(sec=>{
      if(E.isBarCat(sec.t)){
        // bar / alcohol / soft-drinks: included with the package, listed by name (no per-portion qty) and shown BEFORE the food
        const brows=sec.items.map(it=>'<div class="fr"><span>'+E.splitDish(it).name+'</span><b>Included</b></div>').join('');
        if(brows)bar+='<div class="sect">'+sec.t+'</div>'+brows;
        return;
      }
      const names=sec.items.map(it=>E.splitDish(it).name);
      const pr=E.categoryPortions(sec.t,names,t.g);
      const rows=pr.breakdown.filter(b=>b.qty!=null).map(b=>
        '<div class="fr"><span>'+E.dishDisplay(sec.t,b.name)+'</span><b><span class="num">'+b.qty+'</span> '+b.unit+'</b></div>').join('');
      if(rows)food+='<div class="sect">'+sec.t+'</div>'+rows;
    });
    return '<div class="rt">Order summary</div>'+
      '<div class="rr"><span>Package</span><b>'+p.label+'</b></div>'+
      '<div class="rr"><span>Date</span><b>'+(state.date?humanDate(state.date):'-')+'</b></div>'+
      '<div class="rr"><span>Time</span><b class="num">'+(state.slot||'-')+'</b></div>'+
      '<div class="rr"><span>Menu</span><b>'+(state.menu==='evening'?'Evening':'Day')+'</b></div>'+
      '<div class="rr"><span>Guests</span><b class="num">'+t.g+'</b></div>'+
      bar+food+
      '<div class="rr" style="margin-block-start:.35rem"><span>Price per person</span><b class="num">'+fmt(t.ph)+'</b></div>'+
      addRows+
      '<div class="rr"><span>Add-ons</span><b class="num">'+fmt(t.add)+'</b></div>'+
      '<div class="grand"><span>Total (estimated)</span><span class="v">'+fmt(t.total)+'</span></div>';
  }
  function refreshLive(){
    const r=document.getElementById('liveRInner'); if(r)r.innerHTML=receiptInner();
    const tot=document.getElementById('coupeTot');
    if(tot)tot.innerHTML='<span class="num">'+fmt(totals().total)+'</span><small>Total (estimated)</small>';
    updateCoupe();
    ensureScrollCue($('liveR'));
  }

  /* ═══════ STEP 5 · details (the only typing) ═══════ */
  // contract label maps — Monday status-column KEYS (never shown to the customer). Must match the
  // board's existing Hebrew labels exactly, same values the Hebrew v2 sends, or the columns won't set.
  const PKG_LABEL={happyhour:'רגילה',gibush:'מורחבת',mesiba:'פרימיום'};
  const BAR_LABEL={happyhour:'בר רגיל (כלול בחבילה)',gibush:'בר מורחב (כלול בחבילה)',mesiba:'בר פרימיום (כלול בחבילה)'};
  const DJ_LABEL={happyhour:'פלייליסט + מערכת סאונד (כלול)',gibush:'פלייליסט מותאם אישית (כלול)',mesiba:"דיג'יי מהמבחר שלנו (כלול)"};
  // add-ons go to a Monday DROPDOWN column keyed by these exact Hebrew labels; send those (not the
  // English display labels) or create_item errors and the lead is lost. Keyed by the language-neutral id.
  const HE_ADDON_LABEL={fruit:'מגש פירות העונה',soft:'שתייה קלה ומוגזת',balloons:'בלונים',mic:'מיקרופון',karaoke:'מערכת קריוקי',flowers1:'סידורי פרחים · בסיסי',flowers2:'סידורי פרחים · משודרג'};
  const _cookie=n=>{const m=document.cookie.match(new RegExp('(^|;)\\s*'+n+'=\\s*([^;]+)'));return m?m.pop():'';};
  // build the SAME lead payload the live company-events.html sends, then POST to the worker (Monday + CAPI)
  // isCallback = the lead came from the "leave your details / talk to us" path (may have no plan/date yet)
  function submitLead(isCallback){
    const plan=state.plan?E.PLANS[state.plan]:null, ph=plan?plan.perHead:0, gg=state.guests;
    const sel=plan?selectedAddons():[], addOns=plan?addonsTotal(gg):0, base=ph*gg, total=base+addOns;
    const data={
      plan:plan?plan.label:'', hours:plan?plan.hours:'',
      date:state.date?key(state.date):'', slot:state.slot||'',
      guests:gg, perHead:ph, base:base, addonsTotal:addOns, estTotal:total,
      addons:sel.map(a=>a.id), addonLabels:sel.map(a=>HE_ADDON_LABEL[a.id]||a.label),   // Hebrew labels for the Monday dropdown
      name:state.name, company:state.company, phone:state.phone, email:state.email, address:state.address,
      notes:state.notes, menu:state.menu||'', foodNotes:state.foodNotes,
      foodMenuText:plan?E.buildFoodText(state.plan,state.menu,gg,state.foodNotes):'',
      barLabel:BAR_LABEL[state.plan]||'', djLabel:DJ_LABEL[state.plan]||'',
      packageLabel:PKG_LABEL[state.plan]||'',
      perHeadText:ph?('₪'+Number(ph).toLocaleString('en-US')+' per person'):'',
      addonsText:'₪'+Number(addOns||0).toLocaleString('en-US'),
      barMenuText:plan?E.buildBarText(state.plan,state.menu):'',
      // worker: isPackage = !leadType. A completed booking must send NO leadType so it gets the full
      // package columns (status/price/bar/DJ/add-ons). A callback/abandon lead is "incomplete" so it
      // routes to the "Asked For Follow Up" group.
      leadType:isCallback?'incomplete':'',
      wantsCall: isCallback ? true : !!($('fWantsCall')&&$('fWantsCall').checked),
      consent: isCallback ? !!($('tkConsent')&&$('tkConsent').checked) : !!($('fConsent')&&$('fConsent').checked),
      hp: isCallback ? (($('tkHp')&&$('tkHp').value)||'') : (($('fHp')&&$('fHp').value)||''),   // honeypot
    };
    const _utm=new URLSearchParams(location.search);
    data.utm_campaign=_utm.get('utm_campaign')||(isCallback?'talk_to_sales':''); data.utm_source=_utm.get('utm_source')||'';
    const eventId='lead-'+Date.now()+'-'+Math.random().toString(36).slice(2,8);
    data.eventId=eventId; data.pageUrl=location.href; data.fbp=_cookie('_fbp'); data.fbc=_cookie('_fbc');
    fetch((window.EZRA_LEAD_ENDPOINT||'/api/submit-lead'),{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(data)}).catch(()=>{});
    if(window.fbq) fbq('track','Lead',{value:total||0,currency:'ILS'},{eventID:eventId});
    if(window.gtag) gtag('event','generate_lead',{value:total||0,currency:'ILS',transaction_id:eventId});
    clearSave(); saveOn=false; if(saveChk) saveChk.checked=false;   // booked - no draft to resume
  }
  function step5(){
    setFoot('Send request','',()=>{   // terms line lives under the form (.legal); no need to repeat it in the footer
      // consent is mandatory: block the send + flag it if unchecked
      const c=$('fConsent');
      if(!c || !c.checked){
        const err=$('consentErr'), row=$('consentRow');
        if(err) err.hidden=false; if(row) row.classList.add('check--err');
        (err||row||c).scrollIntoView({behavior:'smooth',block:'center'});
        return;
      }
      state.notes=$('fNotes').value; submitLead(); render(6);
    },true,false);   // step 5 = the details step; the "talk to sales" checkbox handles the abandon path here
    body.innerHTML =
      '<h2 class="steptitle">Your details</h2>'+
      '<p class="stepsub">We\'ll send you a proposal and a contract for digital signature</p>'+
      '<div class="details">'+
        '<div class="details__form" id="detForm">'+
          '<div class="frow">'+
            '<div class="bfield"><label>Full name</label><input type="text" id="fName" autocomplete="name" /></div>'+
            '<div class="bfield"><label>Company</label><input type="text" id="fCompany" autocomplete="organization" /></div>'+
          '</div>'+
          '<div class="frow">'+
            '<div class="bfield"><label>Phone</label><input type="tel" id="fPhone" inputmode="tel" autocomplete="tel" /></div>'+
            '<div class="bfield"><label>Email</label><input type="email" id="fEmail" inputmode="email" autocomplete="email" /></div>'+
          '</div>'+
          '<div class="bfield"><label>Address</label><input type="text" id="fAddress" autocomplete="street-address" /></div>'+
          '<div class="bfield"><label>Anything we should know? (optional)</label><textarea id="fNotes" rows="2"></textarea></div>'+
          '<input type="text" id="fHp" tabindex="-1" autocomplete="off" aria-hidden="true" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0" />'+
          '<label class="check"><input type="checkbox" id="fWantsCall" /><span><b>I\'d like to speak with the sales manager before signing</b>'+
            'Please note: checking this will take you out of the booking process. We\'ll keep the details you entered and get back to you for a personal call.</span></label>'+
          '<label class="check" id="consentRow"><input type="checkbox" id="fConsent" /><span><b>Marketing consent</b>'+
            'I agree to receive updates, offers and marketing content from Ezra by email and SMS. You can unsubscribe at any time.</span></label>'+
          '<div class="consent-err" id="consentErr" hidden>Please accept marketing consent to continue.</div>'+
        '</div>'+
        '<div class="details__rcpt"><div class="rcpt" id="detR">'+receiptInner()+'</div></div>'+
      '</div>'+
      '<div class="legal">By submitting the form I accept the terms of use and privacy policy.</div>';
    body.classList.add('is-details');   // make .body a flex column so the two panels fill + scroll like step 4
    // prefill from state (so save/restore + back keep what was typed)
    const map={fName:'name',fCompany:'company',fPhone:'phone',fEmail:'email',fAddress:'address',fNotes:'notes'};
    Object.keys(map).forEach(id=>{const el=$(id);if(el)el.value=state[map[id]]||'';});
    const req=['fName','fPhone','fEmail'].map(id=>$(id));
    const validate=()=>{goBtn.disabled=!req.every(el=>el.value.trim());};
    body.querySelectorAll('input,textarea').forEach(el=>el.addEventListener('input',()=>{
      if(map[el.id]) state[map[el.id]]=el.value;
      validate(); saveMaybe();
    }));
    // clear the consent error once they tick it
    const cc=$('fConsent');
    if(cc) cc.addEventListener('change',()=>{ if(cc.checked){ const e=$('consentErr'),r=$('consentRow');
      if(e) e.hidden=true; if(r) r.classList.remove('check--err'); } });
    // "talk to sales before signing" = leave the booking flow → the abandon screen (which shows the disclaimer)
    const wc=$('fWantsCall');
    if(wc) wc.addEventListener('change',()=>{ if(wc.checked){ wc.checked=false; openTalk(5); } });
    validate();
    // scroll-cue on each column (shows only if that panel actually overflows); equal-height columns → arrows align
    ensureScrollCue($('detForm'));
    ensureScrollCue($('detR'));
  }

  /* ═══════ STEP 6 · confirmation ═══════ */
  function step6(){
    setFoot(null,null,null,false,false);   // confirmation: no CTA and no talk prompt
    body.innerHTML =
      '<div class="done">'+
        '<div class="done__badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>'+
        '<div class="dt">Your request has been received</div>'+
        '<div class="hero">A contract has been emailed to you</div>'+
        '<a class="done__cta" href="mailto:" aria-label="Open your email app">'+
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>'+
          'Take me to my email'+
        '</a>'+
        '<p class="done__play">The contract is already waiting in your inbox - all that\'s left is to sign :)</p>'+
        '<div class="done__note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v6"/><path d="M12 16h.01"/></svg>'+
          '<span>Please note: the contract we sent is valid for 24 hours only. Without a signed contract, we can\'t hold the time slot that was promised.</span></div>'+
        '<p class="done__fine">We\'ll get back to you within 24 hours to confirm the final details and collect a deposit. The email may take a few moments to arrive.</p>'+
      '</div>';
  }

  /* ═══════ TALK · leave-your-details (abandon the self-serve flow, talk to sales) ═══════ */
  const TALK_INFO='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M12 11v5"/></svg>';
  function openTalk(fromStep){
    inTalk=true; talkFromStep=fromStep||1;
    stopBubbles();
    $('progTxt').textContent='Contact us';
    [...$('progDots').children].forEach(d=>d.classList.remove('on'));
    $('backBtn').hidden=false;
    body.className='body'; body.scrollTop=0; void body.offsetWidth; body.classList.add('anim-fwd');
    setFoot('Send details','', submitTalk, true, false);   // no talk-prompt on the talk screen itself
    body.innerHTML =
      '<div class="talk">'+
        '<div class="talk__note">'+TALK_INFO+
          '<div><b>You\'re leaving the self-service booking process</b>'+
          '<span>No commitment. We\'ll keep what you already filled in, and the sales manager will get back to you to arrange the event personally.</span></div>'+
        '</div>'+
        '<h2 class="steptitle">We\'ll get back to you</h2>'+
        '<p class="stepsub">Leave your details and we\'ll arrange a personal call</p>'+
        '<div class="talk__form">'+
          '<div class="frow">'+
            '<div class="bfield"><label>Full name</label><input type="text" id="tkName" autocomplete="name" /></div>'+
            '<div class="bfield"><label>Phone</label><input type="tel" id="tkPhone" inputmode="tel" autocomplete="tel" /></div>'+
          '</div>'+
          '<div class="frow">'+
            '<div class="bfield"><label>Email</label><input type="email" id="tkEmail" inputmode="email" autocomplete="email" /></div>'+
            '<div class="bfield"><label>Company (optional)</label><input type="text" id="tkCompany" autocomplete="organization" /></div>'+
          '</div>'+
          '<div class="bfield"><label>Anything we should know? (optional)</label><textarea id="tkNotes" rows="2"></textarea></div>'+
          '<input type="text" id="tkHp" tabindex="-1" autocomplete="off" aria-hidden="true" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0" />'+
          '<label class="check" id="tkConsentRow"><input type="checkbox" id="tkConsent" /><span><b>Marketing consent</b>'+
            'I agree to receive updates, offers and marketing content from Ezra by email and SMS. You can unsubscribe at any time.</span></label>'+
          '<div class="consent-err" id="tkConsentErr" hidden>Please accept marketing consent to continue.</div>'+
        '</div>';
    const map={tkName:'name',tkPhone:'phone',tkEmail:'email',tkCompany:'company',tkNotes:'notes'};
    Object.keys(map).forEach(id=>{const el=$(id);if(el)el.value=state[map[id]]||'';});
    const req=['tkName','tkPhone','tkEmail'].map(id=>$(id));
    const validate=()=>{goBtn.disabled=!req.every(el=>el.value.trim());};
    body.querySelectorAll('input,textarea').forEach(el=>el.addEventListener('input',()=>{
      if(map[el.id]) state[map[el.id]]=el.value; validate(); saveMaybe();
    }));
    const cc=$('tkConsent');
    if(cc) cc.addEventListener('change',()=>{ if(cc.checked){ const e=$('tkConsentErr'),r=$('tkConsentRow');
      if(e) e.hidden=true; if(r) r.classList.remove('check--err'); } });
    validate();
  }
  function submitTalk(){
    const c=$('tkConsent');
    if(!c || !c.checked){
      const e=$('tkConsentErr'), r=$('tkConsentRow');
      if(e) e.hidden=false; if(r) r.classList.add('check--err');
      (e||r||c).scrollIntoView({behavior:'smooth',block:'center'});
      return;
    }
    state.notes=$('tkNotes').value;
    submitLead(true);          // callback lead (guards a missing plan/date)
    inTalk=false;
    callbackDone();
  }
  function callbackDone(){
    setFoot(null,null,null,false,false);
    $('progTxt').textContent='Done';
    [...$('progDots').children].forEach(d=>d.classList.remove('on'));
    $('backBtn').hidden=true;
    body.className='body'; body.scrollTop=0; void body.offsetWidth; body.classList.add('anim-fwd');
    body.innerHTML =
      '<div class="done">'+
        '<div class="done__badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>'+
        '<div class="dt">We\'ve received your details</div>'+
        '<div class="hero">The sales manager will get back to you shortly</div>'+
        '<div class="done__note">'+TALK_INFO+
          '<span>We\'ve saved everything you filled in so far. We\'ll get back to you to arrange the event personally, with no commitment.</span></div>'+
      '</div>';
  }

  const STEPS={1:step1,2:step2,3:step3,4:step4,5:step5,6:step6};

  // ── boot: opened from a package card (?plan=) → preselect it and jump to the WHEN step;
  //         otherwise restore a saved session if there is one, else start fresh ──
  (function boot(){
    const pplan=new URLSearchParams(location.search).get('plan');
    if(pplan && E.PLANS[pplan]){ state.plan=pplan; render(2); return; }
    let s=null; try{ s=JSON.parse(localStorage.getItem(SAVE_KEY)||'null'); }catch(e){}
    if(!s){ render(1); return; }
    state.plan=(s.plan&&E.PLANS[s.plan])?s.plan:null; state.slot=s.slot||null; state.guests=s.guests||20;
    state.menu=s.menu||null; state.addons=s.addons||{}; state.foodNotes=s.foodNotes||''; state.notes=s.notes||'';
    state.name=s.name||''; state.company=s.company||''; state.phone=s.phone||''; state.email=s.email||''; state.address=s.address||'';
    if(s.date){ const d=new Date(s.date); if(!isNaN(d.getTime())){ d.setHours(0,0,0,0); state.date=d; view=new Date(d.getFullYear(),d.getMonth(),1); } }
    saveOn=true; if(saveChk) saveChk.checked=true;
    render(Math.min(Math.max(s.step||1,1),5));
  })();
})();
</script>
</body>
</html>
