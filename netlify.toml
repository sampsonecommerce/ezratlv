# Netlify config for the Ezra TLV static site + serverless functions.
# Static multi-page HTML, no build step. Functions live in netlify/functions.

[build]
  publish = "."
  command = ""
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Clean URL for the lead-submit function: the site POSTs to /api/submit-lead
# instead of the raw /.netlify/functions/ path.
[[redirects]]
  from = "/api/submit-lead"
  to = "/.netlify/functions/submit-lead"
  status = 200

# Old company-page URL -> new one, so any existing links don't 404.
[[redirects]]
  from = "/iruvei-hevra"
  to = "/company-events"
  status = 301

[[redirects]]
  from = "/iruvei-hevra.html"
  to = "/company-events"
  status = 301

# Old Wix URLs Google still has indexed (the Hebrew site lived under /he, e.g.
# the homepage at /he) -> send them to the new homepage instead of a 404.
[[redirects]]
  from = "/he"
  to = "/"
  status = 301

[[redirects]]
  from = "/he/*"
  to = "/"
  status = 301

# Safety net: any other stale legacy path that no longer exists falls back to the
# homepage rather than a 404. Real files and the rules above are matched first.
[[redirects]]
  from = "/*"
  to = "/"
  status = 301
